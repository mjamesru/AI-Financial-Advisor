<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Financial Advisor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Financial Advisor</h1>
            <p>Get personalized financial advice powered by AI</p>
        </header>

        <div class="input-section" id="inputSection">
            <h2>Tell us about your finances</h2>
            
            <form id="financialForm">
                <div class="input-group">
                    <label for="salary">Monthly Salary ($)</label>
                    <input type="number" id="salary" name="salary" placeholder="e.g., 5000" required>
                </div>

                <div class="input-group">
                    <label for="expenses">Monthly Expenses ($)</label>
                    <input type="number" id="expenses" name="expenses" placeholder="e.g., 3500" required>
                </div>

                <div class="input-group">
                    <label for="goals">Financial Goals</label>
                    <select id="goals" name="goals" required>
                        <option value="">Select your primary goal</option>
                        <option value="emergency_fund">Build Emergency Fund</option>
                        <option value="retirement">Retirement Planning</option>
                        <option value="house_down_payment">Save for House Down Payment</option>
                        <option value="debt_payoff">Pay off Debt</option>
                        <option value="investment">Investment Growth</option>
                        <option value="vacation">Save for Vacation</option>
                        <option value="education">Education Fund</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="timeframe">Time Frame (months)</label>
                    <input type="number" id="timeframe" name="timeframe" placeholder="e.g., 12" min="1" max="360" required>
                </div>

                <div class="input-group">
                    <label for="riskTolerance">Risk Tolerance</label>
                    <select id="riskTolerance" name="riskTolerance" required>
                        <option value="">Select risk level</option>
                        <option value="conservative">Conservative (Low Risk)</option>
                        <option value="moderate">Moderate (Medium Risk)</option>
                        <option value="aggressive">Aggressive (High Risk)</option>
                    </select>
                </div>

                <button type="submit" class="generate-btn">Generate AI Financial Plan</button>
            </form>
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <h2>Your AI-Generated Financial Plan</h2>
            
            <div class="plan-summary" id="planSummary">
                <!-- AI-generated plan will be inserted here -->
            </div>

            <div class="charts-container">
                <div class="chart-wrapper">
                    <h3>Monthly Budget Breakdown</h3>
                    <canvas id="budgetChart"></canvas>
                </div>
                
                <div class="chart-wrapper">
                    <h3>Savings Progress Projection</h3>
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="actionable-steps" id="actionableSteps">
                <!-- AI-generated steps will be inserted here -->
            </div>

            <button class="new-plan-btn" onclick="resetForm()">Create New Plan</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
